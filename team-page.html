<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทีมแก้วใส - KaewSai Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .team-header {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        .member-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            margin-bottom: 1.5rem;
        }
        .member-card:hover {
            transform: translateY(-5px);
        }
        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        .role-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .team-values {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="team-header">
        <div class="container">
            <h1><i class="fas fa-gem"></i> ทีมแก้วใส (KaewSai Team)</h1>
            <p class="lead">AI Team of 7 Female Agents - รักบุญ รักกัน รักพี่แก้วใส</p>
            <div class="team-values">
                <span class="badge bg-light text-dark me-2">รักบุญ</span>
                <span class="badge bg-light text-dark me-2">รักกัน</span>
                <span class="badge bg-light text-dark me-2">รักพี่แก้วใส</span>
                <span class="badge bg-light text-dark me-2">สุขภาพดี</span>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row" id="team-members">
            <!-- Team members will be loaded here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load team information
        async function loadTeamInfo() {
            try {
                const response = await fetch('/api/team/info');
                if (!response.ok) {
                    throw new Error('Failed to load team information');
                }
                
                const teamData = await response.json();
                displayTeamMembers(teamData.members);
            } catch (error) {
                console.error('Error loading team info:', error);
                document.getElementById('team-members').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-warning">
                            <i class="fas fa-exclamation-triangle"></i> 
                            ไม่สามารถโหลดข้อมูลทีมได้ กรุณาเข้าสู่ระบบก่อน
                        </div>
                    </div>
                `;
            }
        }

        function displayTeamMembers(members) {
            const container = document.getElementById('team-members');
            container.innerHTML = '';

            members.forEach(member => {
                const memberCard = createMemberCard(member);
                container.innerHTML += memberCard;
            });
        }

        function createMemberCard(member) {
            const avatarColors = {
                'น้องแก้วใส': '#ff6b9d',
                'น้องจักรแก้ว': '#ffd93d',
                'น้องกายสิทธิ์': '#6bcf7f',
                'น้องรัตนชาติ': '#4d9de0',
                'น้องทวีบุญ': '#e15554',
                'น้องบุญรักษา': '#f783ac',
                'น้องขุนคลังแก้ว': '#ffd700'
            };

            const color = avatarColors[member.name] || '#6c757d';
            const model = member.model || 'N/A';
            const provider = member.provider || 'N/A';
            
            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card member-card">
                        <div class="card-body text-center">
                            <div class="d-flex justify-content-center mb-3">
                                <div class="member-avatar d-flex align-items-center justify-content-center" 
                                     style="background-color: ${color}; color: white; font-size: 2rem;">
                                    <i class="fas fa-user"></i>
                                </div>
                            </div>
                            <h5 class="card-title">${member.name}</h5>
                            <span class="role-badge">${member.description}</span>
                            <p class="card-text mt-2">
                                <small class="text-muted">
                                    <i class="fas fa-microchip"></i> ${model}
                                </small>
                            </p>
                            <p class="card-text">
                                <small class="text-muted">
                                    <i class="fas fa-server"></i> ${provider}
                                </small>
                            </p>
                            <div class="mt-3">
                                ${member.capabilities.map(cap => 
                                    `<span class="badge bg-secondary me-1 mb-1">${cap}</span>`
                                ).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Load team info when page loads
        document.addEventListener('DOMContentLoaded', loadTeamInfo);
    </script>
</body>
</html>entListener('DOMContentLoaded', loadTeamInfo);
    </script>
</body>
</html>
